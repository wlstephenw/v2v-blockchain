# V2V Blockchain Multi-Node Docker Compose
# Task 13.2: Implement docker-compose multi-node deployment

version: '3.8'

services:
  # Validator Node 1 (Primary)
  validator1:
    build: .
    container_name: v2v-validator1
    hostname: validator1
    ports:
      - "8081:8080"
      - "10001:10000"
    volumes:
      - validator1-data:/data
    environment:
      - V2V_NODE_ID=validator1
      - V2V_VALIDATOR=true
      - V2V_LOG_LEVEL=info
    command: >
      start
      --data-dir /data
      --api-port 8080
      --validator
      --log-level info
    networks:
      - v2v-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Validator Node 2
  validator2:
    build: .
    container_name: v2v-validator2
    hostname: validator2
    ports:
      - "8082:8080"
      - "10002:10000"
    volumes:
      - validator2-data:/data
    environment:
      - V2V_NODE_ID=validator2
      - V2V_VALIDATOR=true
      - V2V_LOG_LEVEL=info
      - V2V_BOOTSTRAP=/dns4/validator1/tcp/10000
    command: >
      start
      --data-dir /data
      --api-port 8080
      --validator
      --log-level info
      --bootstrap /dns4/validator1/tcp/10000
    networks:
      - v2v-network
    depends_on:
      validator1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Validator Node 3
  validator3:
    build: .
    container_name: v2v-validator3
    hostname: validator3
    ports:
      - "8083:8080"
      - "10003:10000"
    volumes:
      - validator3-data:/data
    environment:
      - V2V_NODE_ID=validator3
      - V2V_VALIDATOR=true
      - V2V_LOG_LEVEL=info
      - V2V_BOOTSTRAP=/dns4/validator1/tcp/10000
    command: >
      start
      --data-dir /data
      --api-port 8080
      --validator
      --log-level info
      --bootstrap /dns4/validator1/tcp/10000
    networks:
      - v2v-network
    depends_on:
      validator1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Validator Node 4
  validator4:
    build: .
    container_name: v2v-validator4
    hostname: validator4
    ports:
      - "8084:8080"
      - "10004:10000"
    volumes:
      - validator4-data:/data
    environment:
      - V2V_NODE_ID=validator4
      - V2V_VALIDATOR=true
      - V2V_LOG_LEVEL=info
      - V2V_BOOTSTRAP=/dns4/validator1/tcp/10000
    command: >
      start
      --data-dir /data
      --api-port 8080
      --validator
      --log-level info
      --bootstrap /dns4/validator1/tcp/10000
    networks:
      - v2v-network
    depends_on:
      validator1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Follower Node 1
  follower1:
    build: .
    container_name: v2v-follower1
    hostname: follower1
    ports:
      - "8085:8080"
      - "10005:10000"
    volumes:
      - follower1-data:/data
    environment:
      - V2V_NODE_ID=follower1
      - V2V_VALIDATOR=false
      - V2V_LOG_LEVEL=info
      - V2V_BOOTSTRAP=/dns4/validator1/tcp/10000
    command: >
      start
      --data-dir /data
      --api-port 8080
      --log-level info
      --bootstrap /dns4/validator1/tcp/10000
    networks:
      - v2v-network
    depends_on:
      - validator1
      - validator2
      - validator3
      - validator4

  # Follower Node 2
  follower2:
    build: .
    container_name: v2v-follower2
    hostname: follower2
    ports:
      - "8086:8080"
      - "10006:10000"
    volumes:
      - follower2-data:/data
    environment:
      - V2V_NODE_ID=follower2
      - V2V_VALIDATOR=false
      - V2V_LOG_LEVEL=info
      - V2V_BOOTSTRAP=/dns4/validator1/tcp/10000
    command: >
      start
      --data-dir /data
      --api-port 8080
      --log-level info
      --bootstrap /dns4/validator1/tcp/10000
    networks:
      - v2v-network
    depends_on:
      - validator1
      - validator2
      - validator3
      - validator4

networks:
  v2v-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  validator1-data:
  validator2-data:
  validator3-data:
  validator4-data:
  follower1-data:
  follower2-data:
