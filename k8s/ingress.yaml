apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: v2v-api
  namespace: v2v-blockchain
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: v2v-api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: v2v-validator
                port:
                  number: 8080
  tls:
    - hosts:
        - v2v-api.example.com
      secretName: v2v-tls-secret
