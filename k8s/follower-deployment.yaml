apiVersion: apps/v1
kind: Deployment
metadata:
  name: v2v-follower
  namespace: v2v-blockchain
  labels:
    app: v2v-follower
spec:
  replicas: 2
  selector:
    matchLabels:
      app: v2v-follower
  template:
    metadata:
      labels:
        app: v2v-follower
    spec:
      containers:
        - name: v2v-node
          image: v2v-blockchain:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: api
            - containerPort: 10000
              name: p2p
          env:
            - name: V2V_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: V2V_VALIDATOR
              value: "false"
            - name: V2V_DATA_DIR
              value: "/data"
            - name: V2V_BOOTSTRAP
              value: "/dns4/v2v-validator-0.v2v-validator.v2v-blockchain.svc.cluster.local/tcp/10000"
          envFrom:
            - configMapRef:
                name: v2v-config
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: v2v-follower
  namespace: v2v-blockchain
  labels:
    app: v2v-follower
spec:
  selector:
    app: v2v-follower
  ports:
    - port: 8080
      targetPort: 8080
      name: api
  type: ClusterIP
