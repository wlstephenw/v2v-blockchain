apiVersion: v1
kind: ConfigMap
metadata:
  name: v2v-config
  namespace: v2v-blockchain
data:
  # Network configuration
  V2V_NETWORK_ID: "v2v-mainnet"
  V2V_P2P_PORT: "10000"
  V2V_API_PORT: "8080"
  
  # Consensus configuration
  V2V_CONSENSUS_TYPE: "pbft"
  V2V_BLOCK_INTERVAL: "2000"
  V2V_VIEW_TIMEOUT: "10000"
  
  # Log configuration
  V2V_LOG_LEVEL: "info"
  V2V_LOG_FORMAT: "json"
